<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Dashboard</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Expense Dashboard</h2>

<button onclick="loadData()">🔄 Refresh</button>

<p id="total">Loading...</p>

<h3>Expenses</h3>
<div id="list"></div>

<!-- IMAGE MODAL -->
<div id="modal"
     style="display:none; position:fixed; top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.9);
            overflow:auto; padding:20px;">

  <button onclick="closeModal()"
          style="position:fixed; top:10px; right:10px; padding:10px;">
    Close
  </button>

  <div id="modalContent"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyGV_cYHE5-yDSlx3L8gxSpg21sl6VzNE6cmp2iL6L7mE6IPMpwNDOR3t-fRTHOiNQ/exec";

let allData = [];

async function loadData() {

  document.getElementById("total").innerText = "Loading...";

  const res = await fetch(API_URL);
  const data = await res.json();

  allData = data;

  let total = 0;
  let html = "";

  data.forEach((row, index) => {

    const merchant = row.merchant || "Unknown";
    const amount = parseFloat(row.amount || 0);
    const date = row.date || "";

    total += amount;

    html += `
      <div onclick="openRecord(${index})"
           style="border-bottom:1px solid #ddd;
                  padding:12px;
                  cursor:pointer;
                  background:#fafafa;
                  margin-bottom:8px;
                  border-radius:6px;">

        <b>${merchant}</b><br>
        ₱${amount}<br>
        <small>${date}</small><br>

        <small style="color:blue;">View receipts →</small>
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Total: ₱" + total.toLocaleString();

  document.getElementById("list").innerHTML = html;
}

function openRecord(index) {

  const row = allData[index];

  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  const merchant = row.merchant || "Expense";
  const files = row.receiptFiles || "";

  content.innerHTML = `
    <h3 style="color:white;">${merchant}</h3>
  `;

  if (!files) {
    content.innerHTML += "<p style='color:white;'>No attachments</p>";
    modal.style.display = "block";
    return;
  }

  const fileArray = files.split(",");

  fileArray.forEach(id => {

    if (!id) return;

    const url = "https://drive.google.com/uc?id=" + id.trim();

    content.innerHTML += `
      <img src="${url}"
           style="width:100%;
                  margin-bottom:15px;
                  border-radius:10px;
                  background:white;
                  padding:5px;">
    `;
  });

  modal.style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

loadData();

</script>

</body>
</html>
