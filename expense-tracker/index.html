<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Expense Tracker</h2>

<input type="date" id="date"><br><br>
<input type="text" id="vatTin" placeholder="VAT TIN"><br><br>
<input type="text" id="merchant" placeholder="Merchant"><br><br>
<input type="number" id="amount" placeholder="Amount"><br><br>
<input type="text" id="cashVoucher" placeholder="Cash Voucher"><br><br>

<h3>Receipts</h3>
<button onclick="openCamera()">📷 Add Photo</button>

<div id="preview"
     style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>

<br><br>

<button onclick="submitExpense()">💾 Save Expense</button>

<p id="status"></p>

<!-- LOADING -->
<div id="loadingOverlay"
     style="display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.7);
            color:white;
            font-size:18px;
            justify-content:center;
            align-items:center;
            z-index:9999;">
  <div style="text-align:center;">
    ⏳ Uploading... Please wait
  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwfWl3LAT4byVwNqwQsB2DRIunqJVOo-hhvMF_5s6tXDx58uCX7EadKlodCtj8ZmA2A/exec";

let allFiles = [];

function setLoading(state) {
  document.getElementById("loadingOverlay").style.display =
    state ? "flex" : "none";
}

function openCamera() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";

  input.onchange = function () {
    const file = input.files[0];
    if (file) {
      allFiles.push(file);
      renderPreview();
    }
  };

  input.click();
}

function renderPreview() {
  const container = document.getElementById("preview");
  container.innerHTML = "";

  allFiles.forEach((file, index) => {

    const url = URL.createObjectURL(file);

    container.innerHTML += `
      <div style="position:relative;">
        <img src="${url}"
             style="width:90px;height:90px;object-fit:cover;border-radius:8px;">
        <button onclick="removeFile(${index})"
                style="position:absolute;top:0;right:0;">❌</button>
      </div>
    `;
  });
}

function removeFile(index) {
  allFiles.splice(index, 1);
  renderPreview();
}

function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

function sanitize(text) {
  return text.toLowerCase().replace(/[^a-z0-9]/g, "_");
}

function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getMonth()+1}${dt.getDate()}${dt.getFullYear()}`;
}

function rand() {
  return Math.floor(Math.random()*9999);
}

/* =========================
   FAST UPLOAD FUNCTION
========================= */
async function uploadFile(file, fileName) {

  const base64 = await toBase64(file);

  const res = await fetch(API_URL + "?action=uploadImage", {
    method: "POST",
    body: JSON.stringify({
      base64,
      fileName
    })
  });

  const data = await res.json();
  return data.fileId;
}

/* =========================
   SAVE EXPENSE (FAST PARALLEL)
========================= */
async function submitExpense() {

  const date = document.getElementById("date").value;
  const merchant = document.getElementById("merchant").value;
  const vatTin = document.getElementById("vatTin").value;
  const amount = document.getElementById("amount").value;
  const cashVoucher = document.getElementById("cashVoucher").value;

  if (!date || !merchant) {
    alert("Date and Merchant required");
    return;
  }

  setLoading(true);
  document.getElementById("status").innerText = "Uploading...";

  try {

    const uploadPromises = allFiles.map((file, i) => {

      const fileName =
        `${formatDate(date)}_${sanitize(merchant)}_${rand()}_${i}.jpg`;

      return uploadFile(file, fileName);
    });

    const fileIds = await Promise.all(uploadPromises);

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        date,
        vatTin,
        merchant,
        amount,
        cashVoucher,
        fileIds
      })
    });

    const data = await res.json();

    document.getElementById("status").innerText =
      "Saved: " + data.id;

    allFiles = [];
    renderPreview();

  } catch (err) {
    document.getElementById("status").innerText =
      "Error uploading";
  }

  setLoading(false);
}

</script>

</body>
</html>
