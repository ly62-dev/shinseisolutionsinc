<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shinsei Expense Tracker</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Expense Tracker</h2>

<!-- INPUTS FIRST -->
<input type="date" id="date" tabindex="1"><br><br>

<input type="text" id="vatTin" placeholder="VAT TIN" tabindex="2"><br><br>

<input type="text" id="merchant" placeholder="Merchant" tabindex="3"><br><br>

<input type="number" id="amount" placeholder="Amount" tabindex="4"><br><br>

<input type="text" id="cashVoucher" placeholder="Cash Voucher" tabindex="5"><br><br>

<!-- FILE UPLOAD -->
<input type="file" id="receipt" tabindex="6"><br><br>

<button onclick="submitExpense()">Save Expense</button>

<p id="status"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyckvVIMlLYLSt5FV0Fn4DrvrbY_xrgGe8nX3-PbWUEMEGVQ4_34D0kCMTzJUSP38Om/exec";

function sanitize(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9]/g, "_")
    .replace(/_+/g, "_")
    .replace(/^_|_$/g, "");
}

function formatDateMMDDYYYY(dateStr) {
  const d = new Date(dateStr);

  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yyyy = d.getFullYear();

  return `${mm}${dd}${yyyy}`;
}

function getRandom() {
  return Math.floor(1000 + Math.random() * 9000);
}

function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

async function submitExpense() {

  const date = document.getElementById("date").value;
  const vatTin = document.getElementById("vatTin").value;
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;
  const cashVoucher = document.getElementById("cashVoucher").value;

  const file = document.getElementById("receipt").files[0];

  if (!date || !merchant) {
    alert("Date and Merchant are required");
    return;
  }

  let fileBase64 = "";
  let fileName = "";

  if (file) {
    fileBase64 = await toBase64(file);

    fileName =
      `${formatDateMMDDYYYY(date)}_${sanitize(merchant)}_${getRandom()}.jpg`;
  }

  document.getElementById("status").innerText = "Uploading...";

  const payload = {
    date,
    vatTin,
    merchant,
    amount,
    cashVoucher,
    fileBase64,
    fileName
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.status === "success") {
      document.getElementById("status").innerText =
      "Saved: " + data.id;

    // RESET FORM AFTER SUCCESS
      document.getElementById("date").value = "";
      document.getElementById("vatTin").value = "";
      document.getElementById("merchant").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("cashVoucher").value = "";

    // Reset file input (important trick)
      document.getElementById("receipt").value = "";

    // AUTO FOCUS BACK TO MERCHANT (fast entry mode)
      setTimeout(() => {
        document.getElementById("merchant").focus();
    }, 300);
      
      window.scrollTo({ top: 0, behavior: "smooth" });
      
    // Optional: clear message after 2 seconds
      setTimeout(() => {
        document.getElementById("status").innerText = "";
    }, 2000);
} else {
      document.getElementById("status").innerText =
        "Error: " + data.message;
    }

  } catch (err) {
    document.getElementById("status").innerText =
      "Request failed";
  }
}

</script>

</body>
</html>
