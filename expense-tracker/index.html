<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    /* NAV */
    .nav {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav a {
      color: white;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .nav a.active {
      background: #00c896;
      color: black;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    /* PREVIEW */
    #preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    /* LOADING */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 18px;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
  <a href="../dashboard/index.html" id="nav-dashboard">📊 Dashboard</a>
  <a href="../expense-tracker/index.html" id="nav-expense">➕ Expenses</a>
  <a href="../reports/index.html" id="nav-reports">📈 Reports</a>
</div>

<div class="container">

<h2>Expense Tracker</h2>

<input type="date" id="date"><br><br>
<input type="text" id="vatTin" placeholder="VAT TIN"><br><br>
<input type="text" id="merchant" placeholder="Merchant"><br><br>
<input type="number" id="amount" placeholder="Amount"><br><br>
<input type="text" id="cashVoucher" placeholder="Cash Voucher"><br><br>
<select id="category">
  <option value="">Select Category</option>

  <option value="Food & Beverage">Food & Beverage</option>
  <option value="Transportation">Transportation</option>
  <option value="Fuel">Fuel</option>
  <option value="Parking">Parking</option>

  <option value="Office Supplies">Office Supplies</option>
  <option value="Utilities">Utilities</option>
  <option value="Maintenance & Repairs">Maintenance & Repairs</option>

  <option value="Marketing">Marketing</option>
  <option value="Professional Fees">Professional Fees</option>
  <option value="Travel">Travel</option>

  <option value="Inventory">Inventory</option>
  <option value="Equipment">Equipment</option>

  <option value="Rent">Rent</option>
  <option value="Payroll">Payroll</option>

  <option value="Medical">Medical</option>
  <option value="Insurance">Insurance</option>

  <option value="Business Expense">Business Expense</option>
  <option value="Personal Expense">Personal Expense</option>
</select><br><br>

<hr>

<h3>Receipts</h3>

<button onclick="openCamera()">📷 Add Receipt</button>

<div id="preview"></div>

<br>

<button onclick="submitExpense()">💾 Save Expense</button>

<p id="status"></p>

</div>

<!-- LOADING -->
<div id="loadingOverlay">
  ⏳ Saving Expense... Please wait
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwpa-3qUHHZmHwLVUUkoMQamli4Yabq8It56qEOpqQY3ck_eX19BcOSZNbEzjWJDgdY/exec";

let allFiles = [];
let isSaving = false;

/* =========================
   LOADING UI
========================= */
function setLoading(state) {
  document.getElementById("loadingOverlay").style.display =
    state ? "flex" : "none";

  document.querySelectorAll("input, button").forEach(el => {
    el.disabled = state;
  });
}

/* =========================
   CAMERA INPUT
========================= */
function openCamera() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";

  input.onchange = () => {
    const file = input.files[0];
    if (file) {
      allFiles.push(file);
      renderPreview();
    }
  };

  input.click();
}

/* =========================
   PREVIEW
========================= */
function renderPreview() {

  const container = document.getElementById("preview");
  container.innerHTML = "";

  allFiles.forEach((file, index) => {

    const url = URL.createObjectURL(file);

    container.innerHTML += `
      <div style="position:relative;">
        <img src="${url}"
             style="width:90px;height:90px;object-fit:cover;border-radius:8px;">
        <button onclick="removeFile(${index})"
                style="position:absolute;top:0;right:0;">❌</button>
      </div>
    `;
  });
}

function removeFile(index) {
  allFiles.splice(index, 1);
  renderPreview();
}

/* =========================
   BASE64 + COMPRESSION
========================= */
function toBase64(file) {
  return new Promise(resolve => {

    const reader = new FileReader();

    reader.onload = () => {

      const img = new Image();
      img.src = reader.result;

      img.onload = () => {

        const canvas = document.createElement("canvas");

        const MAX_WIDTH = 1200;
        const scale = MAX_WIDTH / img.width;

        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scale;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const compressed = canvas.toDataURL("image/jpeg", 0.7);

        resolve(compressed.split(",")[1]);
      };
    };

    reader.readAsDataURL(file);
  });
}

/* =========================
   HELPERS
========================= */
function sanitize(text) {
  return (text || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "_");
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getMonth()+1}${d.getDate()}${d.getFullYear()}`;
}

/* =========================
   SAVE
========================= */
async function submitExpense() {

  if (isSaving) return;
  isSaving = true;

  const date = document.getElementById("date").value;
  const vatTin = document.getElementById("vatTin").value;
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;
  const cashVoucher = document.getElementById("cashVoucher").value;
  const category = document.getElementById("category").value;

  if (!date || !merchant) {
    alert("Date and Merchant required");
    isSaving = false;
    return;
  }

  setLoading(true);
  document.getElementById("status").innerText = "Saving...";

  try {

    const fileBase64Array = [];
    const fileNameArray = [];

    for (let i = 0; i < allFiles.length; i++) {

      const base64 = await toBase64(allFiles[i]);

      fileBase64Array.push(base64);

      fileNameArray.push(
        `${formatDate(date)}_${sanitize(merchant)}_${Date.now()}_${i}.jpg`
      );
    }

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        date,
        vatTin,
        merchant,
        category,
        amount,
        cashVoucher,
        fileBase64Array,
        fileNameArray
      })
    });

    const data = await res.json();

    document.getElementById("status").innerText =
      "Saved: " + data.id;

    /* RESET */
    allFiles = [];
    renderPreview();

    document.getElementById("date").value = "";
    document.getElementById("vatTin").value = "";
    document.getElementById("merchant").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("cashVoucher").value = "";
    document.getElementById("category").value = "";

  } catch (err) {
    document.getElementById("status").innerText =
      "Error saving expense";
  }

  setLoading(false);
  isSaving = false;
}

/* =========================
   NAV ACTIVE
========================= */
window.addEventListener("DOMContentLoaded", () => {

  const path = window.location.pathname;

  if (path.includes("/dashboard/")) {
    document.getElementById("nav-dashboard")?.classList.add("active");
  }

  if (path.includes("/expense-tracker/")) {
    document.getElementById("nav-expense")?.classList.add("active");
  }

  if (path.includes("/reports/")) {
    document.getElementById("nav-reports")?.classList.add("active");
  }
});

</script>

</body>
</html>
