<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Expense Tracker</h2>

<input type="date" id="date"><br><br>
<input type="text" id="vatTin" placeholder="VAT TIN"><br><br>
<input type="text" id="merchant" placeholder="Merchant"><br><br>
<input type="number" id="amount" placeholder="Amount"><br><br>
<input type="text" id="cashVoucher" placeholder="Cash Voucher"><br><br>

<h3>Receipts</h3>

<button onclick="openCamera()">📷 Add Photo</button>

<div id="preview"
     style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;">
</div>

<br><br>

<button onclick="submitExpense()">💾 Save Expense</button>

<p id="status"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxaJY_cSgPtCn8yWAuFTXX8JW_Af5jzsY88aLBYH8uENPMsFurdrIkwufsNa2JJeTCW/exec";

let allFiles = [];

function sanitize(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9]/g, "_")
    .replace(/_+/g, "_")
    .replace(/^_|_$/g, "");
}

function formatDateMMDDYYYY(dateStr) {
  const d = new Date(dateStr);
  return `${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${d.getFullYear()}`;
}

function getRandom() {
  return Math.floor(1000 + Math.random() * 9000);
}

function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

function openCamera() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";

  input.onchange = function () {
    const file = input.files[0];
    if (file) {
      allFiles.push(file);
      renderPreview();
    }
  };

  input.click();
}

function renderPreview() {
  const container = document.getElementById("preview");
  container.innerHTML = "";

  allFiles.forEach((file, index) => {
    const url = URL.createObjectURL(file);

    container.innerHTML += `
      <div style="position:relative;">
        <img src="${url}"
             style="width:100px; height:100px;
                    object-fit:cover;
                    border-radius:8px;">

        <button onclick="removeFile(${index})"
                style="position:absolute;
                       top:0; right:0;">
          ❌
        </button>
      </div>
    `;
  });
}

function removeFile(index) {
  allFiles.splice(index, 1);
  renderPreview();
}

async function submitExpense() {

  const date = document.getElementById("date").value;
  const vatTin = document.getElementById("vatTin").value;
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;
  const cashVoucher = document.getElementById("cashVoucher").value;

  if (!date || !merchant) {
    alert("Date and Merchant required");
    return;
  }

  let fileBase64Array = [];
  let fileNameArray = [];

  for (let i = 0; i < allFiles.length; i++) {

    const base64 = await toBase64(allFiles[i]);
    fileBase64Array.push(base64);

    const name =
      `${formatDateMMDDYYYY(date)}_${sanitize(merchant)}_${getRandom()}_${i}.jpg`;

    fileNameArray.push(name);
  }

  document.getElementById("status").innerText = "Uploading...";

  const payload = {
    date,
    vatTin,
    merchant,
    amount,
    cashVoucher,
    fileBase64Array,
    fileNameArray
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.status === "success") {

      document.getElementById("status").innerText =
        "Saved: " + data.id;

      // reset form
      document.getElementById("date").value = "";
      document.getElementById("vatTin").value = "";
      document.getElementById("merchant").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("cashVoucher").value = "";

      allFiles = [];
      renderPreview();

      window.scrollTo({ top: 0, behavior: "smooth" });

      setTimeout(() => {
        document.getElementById("status").innerText = "";
      }, 2000);

    } else {
      document.getElementById("status").innerText =
        "Error: " + data.message;
    }

  } catch (err) {
    document.getElementById("status").innerText =
      "Request failed";
  }
}

</script>

</body>
</html>
