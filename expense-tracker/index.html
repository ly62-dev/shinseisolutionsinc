<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Expense Tracker</h2>

<input type="date" id="date"><br><br>
<input type="text" id="vatTin" placeholder="VAT TIN"><br><br>
<input type="text" id="merchant" placeholder="Merchant"><br><br>
<input type="number" id="amount" placeholder="Amount"><br><br>
<input type="text" id="cashVoucher" placeholder="Cash Voucher"><br><br>

<input type="file" id="receipt"
       accept="image/*"
       multiple><br><br>

<button onclick="submitExpense()">Save Expense</button>

<p id="status"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwkAJIu8fNeq9dz_eGe0ZXI0naQZPJjUKUh6Pjbx83o0uSPkF8LuBG5o9OWopn-rpLc/exec";

function sanitize(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9]/g, "_")
    .replace(/_+/g, "_")
    .replace(/^_|_$/g, "");
}

function formatDateMMDDYYYY(dateStr) {
  const d = new Date(dateStr);
  return `${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${d.getFullYear()}`;
}

function getRandom() {
  return Math.floor(1000 + Math.random() * 9000);
}

function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

async function submitExpense() {

  const date = document.getElementById("date").value;
  const vatTin = document.getElementById("vatTin").value;
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;
  const cashVoucher = document.getElementById("cashVoucher").value;

  const files = document.getElementById("receipt").files;

  if (!date || !merchant) {
    alert("Date and Merchant required");
    return;
  }

  let fileBase64Array = [];
  let fileNameArray = [];

  if (files && files.length > 0) {
    for (let i = 0; i < files.length; i++) {

      const base64 = await toBase64(files[i]);
      fileBase64Array.push(base64);

      const name =
        `${formatDateMMDDYYYY(date)}_${sanitize(merchant)}_${getRandom()}_${i}.jpg`;

      fileNameArray.push(name);
    }
  }
  console.log("Files selected:", files.length);
  console.log("Base64 array count:", fileBase64Array.length);
  console.log("Filename array count:", fileNameArray.length);
  
  document.getElementById("status").innerText = "Uploading...";

  const payload = {
    date,
    vatTin,
    merchant,
    amount,
    cashVoucher,
    fileBase64Array,
    fileNameArray
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.status === "success") {

      document.getElementById("status").innerText =
        "Saved: " + data.id;

      document.getElementById("date").value = "";
      document.getElementById("vatTin").value = "";
      document.getElementById("merchant").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("cashVoucher").value = "";
      document.getElementById("receipt").value = "";

      setTimeout(() => {
        document.getElementById("merchant").focus();
      }, 200);

      window.scrollTo({ top: 0, behavior: "smooth" });

      setTimeout(() => {
        document.getElementById("status").innerText = "";
      }, 2000);

    } else {
      document.getElementById("status").innerText =
        "Error: " + data.message;
    }

  } catch (err) {
    document.getElementById("status").innerText =
      "Request failed";
  }
}

</script>

</body>
</html>
