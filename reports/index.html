<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Reports</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .nav {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: #111;
      position: sticky;
      top: 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .nav a.active {
      background: #00c896;
      color: black;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-bottom: 20px;
}

th {
  background: #eaeaea;
  text-align: left;
}

th,
td {
  border: 1px solid #ccc;
  padding: 8px;
}

.amount {
  text-align: right;
}

.total-row {
  font-weight: bold;
  background: #f3f3f3;
}

    select, button {
      padding: 8px;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="../dashboard/index.html" id="nav-dashboard">📊 Dashboard</a>
  <a href="../expense-tracker/index.html" id="nav-expense">➕ Expenses</a>
  <a href="../reports/index.html" id="nav-reports">📈 Reports</a>
</div>

<div class="container">

<h2>📈 Expense Reports</h2>

<button onclick="loadData()">🔄 Refresh</button>

<br><br>

<label>Select Month:</label><br>
<select id="monthFilter" onchange="render()"></select>

<h3 id="summary">Loading...</h3>
<h3>Monthly Totals</h3>
<div id="monthlyTotals"></div>

<h3>Merchant Breakdown</h3>
<div id="merchantBreakdown"></div>

<h3>Expense Details</h3>
<div id="expenseDetails"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyF9QFXq1W1fAJcwJ1Ggmlkv-qxaKjjw2Cc-j42oASO50yRxwICbzlB71WB5rHSxZmC/exec";

let allData = [];

/* =========================
   LOAD DATA
========================= */
async function loadData() {

  const res = await fetch(API_URL);
  const data = await res.json();

  allData = data;

  populateMonths();
  render();
}
  
function formatDateMMDDYYYY(dateStr) {
  if (!dateStr) return "";

  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;

  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yyyy = d.getFullYear();

  return `${mm}-${dd}-${yyyy}`;
}
/* =========================
   MONTH LIST
========================= */
function populateMonths() {

  const select = document.getElementById("monthFilter");

  const months = new Set();

  allData.forEach(row => {
    const d = new Date(row.date);
    if (!isNaN(d)) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      months.add(key);
    }
  });

  select.innerHTML = `<option value="all">All Months</option>`;

  Array.from(months).sort().reverse().forEach(m => {
    select.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

/* =========================
   FILTER + RENDER
========================= */
function render() {

  const selected = document.getElementById("monthFilter").value;

  let filtered = allData;

  if (selected !== "all") {
    filtered = allData.filter(row => {

      const d = new Date(row.date);

      const key =
        `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

      return key === selected;
    });
  }

  let total = 0;

  const merchantMap = {};
  const monthlyMap = {};

  filtered.forEach(row => {

    const amount = parseFloat(row.amount || 0);
    const merchant = row.merchant || "Unknown";

    total += amount;

    merchantMap[merchant] =
      (merchantMap[merchant] || 0) + amount;

    const d = new Date(row.date);

    const monthKey =
      `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

    monthlyMap[monthKey] =
      (monthlyMap[monthKey] || 0) + amount;
  });

  const transactionCount = filtered.length;

  document.getElementById("summary").innerHTML = `
    Total Expenses: <b>₱${total.toLocaleString()}</b><br>
    Transactions: <b>${transactionCount}</b><br>
    Average Expense:
    <b>₱${(transactionCount ? total/transactionCount : 0).toLocaleString()}</b>
  `;

  /* MONTHLY TABLE */

  let monthlyHtml = `
    <table>
      <tr>
        <th>Month</th>
        <th class="amount">Amount</th>
      </tr>
  `;

  Object.keys(monthlyMap)
    .sort()
    .reverse()
    .forEach(month => {

      monthlyHtml += `
        <tr>
          <td>${month}</td>
          <td class="amount">
            ₱${monthlyMap[month].toLocaleString()}
          </td>
        </tr>
      `;
    });

  monthlyHtml += "</table>";

  document.getElementById("monthlyTotals").innerHTML =
    monthlyHtml;

  /* MERCHANT TABLE */

  let merchantHtml = `
    <table>
      <tr>
        <th>Merchant</th>
        <th class="amount">Amount</th>
      </tr>
  `;

  Object.keys(merchantMap)
    .sort((a,b) => merchantMap[b]-merchantMap[a])
    .forEach(name => {

      merchantHtml += `
        <tr>
          <td>${name}</td>
          <td class="amount">
            ₱${merchantMap[name].toLocaleString()}
          </td>
        </tr>
      `;
    });

  merchantHtml += `
      <tr class="total-row">
        <td>GRAND TOTAL</td>
        <td class="amount">
          ₱${total.toLocaleString()}
        </td>
      </tr>
    </table>
  `;

  document.getElementById("merchantBreakdown").innerHTML =
    merchantHtml;
  /* EXPENSE DETAILS TABLE */

let detailHtml = `
<table>
  <tr>
    <th>Date</th>
    <th>TIN</th>
    <th>Merchant</th>
    <th class="amount">Amount</th>
  </tr>
`;

filtered
  .sort((a,b) => new Date(b.date) - new Date(a.date))
  .forEach(row => {

    detailHtml += `
      <tr>
        <td>${formatDateMMDDYYYY(row.date)}</td>
        <td>${row.vatTin || ""}</td>
        <td>${row.merchant || ""}</td>
        <td class="amount">
          ₱${parseFloat(row.amount || 0).toLocaleString()}
        </td>
      </tr>
    `;
  });

detailHtml += `
  <tr class="total-row">
    <td colspan="3">TOTAL</td>
    <td class="amount">
      ₱${total.toLocaleString()}
    </td>
  </tr>
</table>
`;

document.getElementById("expenseDetails").innerHTML =
  detailHtml;
}

/* =========================
   NAV ACTIVE
========================= */
window.addEventListener("DOMContentLoaded", () => {

  const path = window.location.pathname;

  if (path.includes("/dashboard/")) {
    document.getElementById("nav-dashboard")?.classList.add("active");
  }

  if (path.includes("/expense-tracker/")) {
    document.getElementById("nav-expense")?.classList.add("active");
  }

  if (path.includes("/reports/")) {
    document.getElementById("nav-reports")?.classList.add("active");
  }

  loadData();
});

</script>

</body>
</html>
