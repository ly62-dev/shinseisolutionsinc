<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Reports</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .nav {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: #111;
      position: sticky;
      top: 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .nav a.active {
      background: #00c896;
      color: black;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 20px;
    }

    th {
      background: #eaeaea;
      text-align: left;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    .amount {
      text-align: right;
    }

    .total-row {
      font-weight: bold;
      background: #f3f3f3;
    }

    select, button, input {
      padding: 8px;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="../dashboard/index.html" id="nav-dashboard">📊 Dashboard</a>
  <a href="../expense-tracker/index.html" id="nav-expense">➕ Expenses</a>
  <a href="../reports/index.html" id="nav-reports">📈 Reports</a>
</div>

<div class="container">

<h2>📈 Expense Reports</h2>

<button onclick="loadData()">🔄 Refresh</button>
<button onclick="exportCSV()">📥 Export CSV</button>
<button onclick="exportPDF()">📄 Export PDF</button>

<br><br>

<label>From:</label><br>
<input type="date" id="fromDate" onchange="render()">

<br><br>

<label>To:</label><br>
<input type="date" id="toDate" onchange="render()">

<br><br>

<select id="monthFilter" onchange="render()"></select>

<h3 id="summary">Loading...</h3>

<h3>Monthly Totals</h3>
<div id="monthlyTotals"></div>

<h3>Merchant Breakdown</h3>
<div id="merchantBreakdown"></div>

<h3>Expense Details</h3>
<div id="expenseDetails"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwuZ6vsqsC1ppCkQCbYt3zK1YbC96ZREo4RuKrC9lcQMqpoILZXPlNbFlTPF_qH_seb/exec";

let allData = [];

/* =========================
   DATE PARSER (FIX CORE ISSUE)
========================= */
function parseDate(value) {
  if (!value) return null;
  const d = new Date(value);
  return isNaN(d) ? null : d;
}

/* =========================
   LOAD DATA (OPTIMIZED)
========================= */
async function loadData() {

  const res = await fetch(API_URL);
  const data = await res.json();

  // PRE-PARSE DATE ONCE (IMPORTANT FIX)
  allData = data.map(row => ({
    ...row,
    _date: parseDate(row.date)
  }));

  populateMonths();
  render();
}

/* =========================
   FORMAT DATE
========================= */
function formatDateMMDDYYYY(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return "";

  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yyyy = d.getFullYear();

  return `${mm}-${dd}-${yyyy}`;
}

/* =========================
   MONTH LIST
========================= */
function populateMonths() {

  const select = document.getElementById("monthFilter");
  const months = new Set();

  allData.forEach(row => {

    const d = row._date;
    if (!d) return;

    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    months.add(key);
  });

  select.innerHTML = `<option value="all">All Months</option>`;

  Array.from(months).sort().reverse().forEach(m => {
    select.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

/* =========================
   RENDER (FIXED FILTER LOGIC)
========================= */
function render() {

  const selected = document.getElementById("monthFilter").value;
  const fromDate = document.getElementById("fromDate").value;
  const toDate = document.getElementById("toDate").value;

  let filtered = allData;

  /* MONTH FILTER */
  if (selected !== "all") {
    filtered = filtered.filter(row => {
      const d = row._date;
      if (!d) return false;

      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return key === selected;
    });
  }

  /* FROM FILTER */
  if (fromDate) {
    const from = new Date(fromDate);
    filtered = filtered.filter(row => row._date && row._date >= from);
  }

  /* TO FILTER */
  if (toDate) {
    const to = new Date(toDate);
    filtered = filtered.filter(row => row._date && row._date <= to);
  }

  let total = 0;
  const merchantMap = {};
  const monthlyMap = {};

  filtered.forEach(row => {

    const amount = parseFloat(row.amount || 0);
    const merchant = row.merchant || "Unknown";

    total += amount;

    merchantMap[merchant] = (merchantMap[merchant] || 0) + amount;

    const d = row._date;
    if (!d) return;

    const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthlyMap[monthKey] = (monthlyMap[monthKey] || 0) + amount;
  });

  /* SUMMARY */
  document.getElementById("summary").innerHTML = `
    Total Expenses: <b>₱${total.toLocaleString()}</b><br>
    Transactions: <b>${filtered.length}</b>
  `;

  /* MONTHLY */
  let monthlyHtml = `<table>
    <tr><th>Month</th><th class="amount">Amount</th></tr>`;

  Object.keys(monthlyMap)
    .sort()
    .reverse()
    .forEach(m => {
      monthlyHtml += `
        <tr>
          <td>${m}</td>
          <td class="amount">₱${monthlyMap[m].toLocaleString()}</td>
        </tr>
      `;
    });

  monthlyHtml += `</table>`;
  document.getElementById("monthlyTotals").innerHTML = monthlyHtml;

  /* MERCHANT */
  let merchantHtml = `<table>
    <tr><th>Merchant</th><th class="amount">Amount</th></tr>`;

  Object.keys(merchantMap)
    .sort((a,b) => merchantMap[b]-merchantMap[a])
    .forEach(m => {
      merchantHtml += `
        <tr>
          <td>${m}</td>
          <td class="amount">₱${merchantMap[m].toLocaleString()}</td>
        </tr>
      `;
    });

  merchantHtml += `</table>`;
  document.getElementById("merchantBreakdown").innerHTML = merchantHtml;

  /* DETAILS */
  let detailHtml = `<table>
    <tr>
      <th>Date</th>
      <th>TIN</th>
      <th>Merchant</th>
      <th class="amount">Amount</th>
    </tr>`;

  filtered
    .sort((a,b) => (b._date || 0) - (a._date || 0))
    .forEach(row => {

      detailHtml += `
        <tr>
          <td>${formatDateMMDDYYYY(row.date)}</td>
          <td>${row.vatTin || ""}</td>
          <td>${row.merchant || ""}</td>
          <td class="amount">₱${parseFloat(row.amount || 0).toLocaleString()}</td>
        </tr>
      `;
    });

  detailHtml += `
    <tr class="total-row">
      <td colspan="3">TOTAL</td>
      <td class="amount">₱${total.toLocaleString()}</td>
    </tr>
  </table>`;

  document.getElementById("expenseDetails").innerHTML = detailHtml;
}

/* =========================
   EXPORT CSV
========================= */
function exportCSV() {

  let csv = "Date,TIN,Merchant,Amount\n";

  allData.forEach(row => {
    csv += `"${formatDateMMDDYYYY(row.date)}","${row.vatTin || ""}","${row.merchant || ""}","${row.amount || 0}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "report.csv";
  a.click();
}

/* =========================
   EXPORT PDF
========================= */
function exportPDF() {

  const win = window.open("", "_blank");

  win.document.write(document.getElementById("expenseDetails").innerHTML);
  win.print();
}

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
  loadData();
});

</script>

</body>
</html>
